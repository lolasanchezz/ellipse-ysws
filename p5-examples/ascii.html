<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Camera</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
    }

    #ascii-output {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px;
      line-height: 9px;
      letter-spacing: 2px;
      color: #00ff41;        /* classic terminal green */
      white-space: pre;
      /* Mirror horizontally so it acts like a mirror */
      transform: scaleX(-1);
      text-shadow: 0 0 4px #00ff41aa;
    }

    #label {
      margin-top: 14px;
      color: #00ff4166;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="ascii-output"></div>
<div id="label">ascii cam</div>

<script>
  const density = " .:-=+*#%@";
  const SAMPLE_W = 100;
  const SAMPLE_H = 42;
  const output = document.getElementById('ascii-output');

  function renderAsciiImage() {
    return new Promise((resolve, reject) => {
      const image = new Image();

      image.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = SAMPLE_W;
          canvas.height = SAMPLE_H;

          const context = canvas.getContext('2d', { willReadFrequently: true });
          context.clearRect(0, 0, SAMPLE_W, SAMPLE_H);
          context.drawImage(image, 0, 0, SAMPLE_W, SAMPLE_H);

          const { data } = context.getImageData(0, 0, SAMPLE_W, SAMPLE_H);
          let ascii = '';

          for (let y = 0; y < SAMPLE_H; y++) {
            for (let x = 0; x < SAMPLE_W; x++) {
              const idx = (x + y * SAMPLE_W) * 4;
              const alpha = data[idx + 3];

              if (alpha === 0) {
                ascii += ' ';
                continue;
              }

              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
              const normalized = brightness / 255;
              const charIndex = Math.max(0, Math.min(density.length - 1, Math.floor(normalized * (density.length - 1))));
              ascii += density[charIndex];
            }

            ascii += '\n';
          }

          output.textContent = ascii;
          resolve();
        } catch (error) {
          reject(error);
        }
      };

      image.onerror = () => reject(new Error('could not load ../orph.png'));
      image.src = '../orph.png';
    });
  }

  renderAsciiImage().catch((error) => {
    output.textContent = 'failed to load image: ' + error.message;
  });
</script>
</body>
</html>
